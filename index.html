<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khaligraph Jones | The O.G. Portfolio</title>
    <style>
        /* Styling for Roy's Section (Reg: 260057) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        #gallery-events {
            max-width: 900px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        h2 {
            color: #d4af37; /* O.G. Gold */
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0 40px 0;
        }

        .gallery-item {
            background: #2a2a2a;
            padding: 50px 20px;
            text-align: center;
            border-radius: 8px;
            border: 1px dashed #555;
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            border-color: #d4af37;
        }

        .events-list {
            list-style: none;
            padding: 0;
        }

        .event-card {
            background: #252525;
            margin: 10px 0;
            padding: 15px;
            border-left: 5px solid #d4af37;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-date {
            font-weight: bold;
            color: #d4af37;
        }

        .event-location {
            font-style: italic;
            color: #bbb;
        }
    </style>
</head>
<body>

    <section id="gallery-events">
        <h2>The O.G. Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item">[Photo: BET Awards Red Carpet]</div>
            <div class="gallery-item">[Photo: Sold Out KICC Nairobi]</div>
            <div class="gallery-item">[Photo: Studio Session - Blue Ink]</div>
        </div>

        <h2>Upcoming 2026 World Tour</h2>
        <ul class="events-list">
            <li class="event-card">
                <span class="event-date">April 12, 2026</span>
                <span>London Live Concert</span>
                <span class="event-location">London, UK</span>
            </li>
            <li class="event-card">
                <span class="event-date">May 05, 2026</span>
                <span>The O.G. USA Tour</span>
                <span class="event-location">Dallas, Texas</span>
            </li>
            <li class="event-card">
                <span class="event-date">June 20, 2026</span>
                <span>Nairobi Homecoming</span>
                <span class="event-location">Nairobi, Kenya</span>
            </li>
        </ul>
    </section>

</body>
</html>
